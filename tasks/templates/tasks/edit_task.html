<!DOCTYPE html>
<html>
<head>
    <title>Edit Task - Hangarin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fb;
            margin: 0;
        }

        .navbar {
            background: #1e293b;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1e293b;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        button:hover {
            background: #334155;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #1e293b;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="navbar">
    Hangarin ✨ Task Manager
</div>

<div class="container">
    <div class="form-container">
        <h2>Edit Task</h2>

        <form method="POST">
            {% csrf_token %}
            <input name="title" placeholder="Task Title" value="{{ task.title }}" required><br>
            <textarea name="description" placeholder="Task Description">{{ task.description }}</textarea><br>

            <select name="status" required>
                <option value="Pending" {% if task.status == "Pending" %}selected{% endif %}>Pending</option>
                <option value="In Progress" {% if task.status == "In Progress" %}selected{% endif %}>In Progress</option>
                <option value="Completed" {% if task.status == "Completed" %}selected{% endif %}>Completed</option>
            </select><br>

            <input type="datetime-local" name="deadline" value="{{ task.deadline|date:'Y-m-d\TH:i' }}" required><br>

            <input name="priority" placeholder="Priority ID" type="number" value="{{ task.priority.id }}" required><br>
            <input name="category" placeholder="Category ID" type="number" value="{{ task.category.id }}" required><br>

            <button type="submit">Update Task</button>
        </form>

        <a href="/" class="back-link">← Back to Tasks</a>
    </div>
</div>

</body>
</html>
