<!DOCTYPE html>
<html>
<head>
    <title>Login - Hangarin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fb;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .navbar {
            background: #1e293b;
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            position: absolute;
            top: 0;
            width: 100%;
            box-sizing: border-box;
        }

        h2 {
            margin-bottom: 30px;
            color: #1e293b;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1e293b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        button:hover {
            background: #334155;
        }

        .login-form {
            display: grid;
            gap: 14px;
            text-align: left;
        }

        .or-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            font-size: 14px;
            margin: 24px 0 16px;
        }

        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
            margin: 0 12px;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            margin-top: 0;
            background: white;
            color: #202124;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .google-btn:hover {
            background: #f8fafc;
            box-shadow: 0 8px 16px rgba(15, 23, 42, 0.08);
            border-color: #cbd5e1;
        }

        .google-icon {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            display: inline-flex;
        }

        .social-note {
            color: #6b7280;
            font-size: 14px;
            margin-top: 12px;
        }

        .footer {
            margin-top: 24px;
            color: #9ca3af;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="navbar">
    Hangarin ✨ Task Manager
</div>

<div class="login-container">
    <h2>Login to Hangarin</h2>

    {% load socialaccount %}
    <form method="POST" class="login-form">
        {% csrf_token %}
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="or-divider">Or continue with</div>

    <a class="google-btn" href="{% provider_login_url 'google' %}">
        <span class="google-icon">
            <svg viewBox="0 0 533.5 544.3" xmlns="http://www.w3.org/2000/svg">
                <path fill="#4285F4" d="M533.5 278.4c0-17.2-1.5-34.1-4.3-50.4H272.1v95.5h146.9c-6.3 34-25.6 62.8-54.5 82v68h88.1c51.5-47.4 81.9-117.5 81.9-195.1z"/>
                <path fill="#34A853" d="M272.1 544.3c73.8 0 135.9-24.4 181.2-66.2l-88.1-68c-24.5 16.4-55.7 26-93.1 26-71.6 0-132.4-48.3-154.1-113.2h-90.4v70.9c45.8 90.5 140 150.5 244.5 150.5z"/>
                <path fill="#FBBC05" d="M118 323.4c-10.5-31.4-10.5-65.5 0-96.9V155.6H27.6c-42.6 84.3-42.6 184.9 0 269.2l90.4-70.9z"/>
                <path fill="#EA4335" d="M272.1 107.1c39.8 0 75.5 13.7 103.6 40.6l77.7-77.7C412.4 24.1 352.9 0 272.1 0 167.6 0 73.3 60 27.6 150.5l90.4 70.9c21.7-64.9 82.5-113.2 154.1-113.2z"/>
            </svg>
        </span>
        Sign in with Google
    </a>

    <div class="social-note">Use your Google account to sign in instantly.</div>

    <div class="footer">
        Hangarin © 2026
    </div>
</div>

</body>
</html>
